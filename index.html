<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trace</title>
</head>

<body style="
font-family:sans-serif;
padding:40px;
line-height:2;
background:#fff;
color:#111;
">

<p id="step1">숨을 느껴보세요</p>
<label id="bLabel" style="opacity:0.4;">
  ● 기록하기
  <input type="file" accept="audio/*" capture id="breath" style="display:none;">
</label>
<p id="bDone" style="opacity:0; font-size:12px;">기록되었습니다</p>

<br><br>

<p id="step2" style="opacity:0.2;">주변의 소리를 들어보세요</p>
<label id="aLabel" style="opacity:0.1;">
  ● 기록하기
  <input type="file" accept="audio/*" capture id="ambient" style="display:none;">
</label>
<p id="aDone" style="opacity:0; font-size:12px;">기록되었습니다</p>

<br><br>

<p id="step3" style="opacity:0.2;">하나를 남겨보세요</p>
<label id="pLabel" style="opacity:0.1;">
  ● 기록하기
  <input type="file" accept="audio/*" capture id="personal" style="display:none;">
</label>
<p id="pDone" style="opacity:0; font-size:12px;">기록되었습니다</p>

<br><br><br>

<input placeholder="이름 (선택)" id="name" style="border:none; border-bottom:1px solid #aaa; padding:5px; width:200px;">

<br><br><br>

<p id="playText" onclick="play()" style="opacity:0.2; cursor:pointer;">
쌓인 것을 들어보세요
</p>

<p onclick="downloadMix()" style="opacity:0.2; cursor:pointer;">
기록을 가져가세요
</p>

<script>

let recordings = {};

// 숨
document.getElementById("breath").onchange = e => {
  recordings.breath = e.target.files[0];

  document.getElementById("bDone").style.opacity = 1;

  document.getElementById("step2").style.opacity = 1;
  document.getElementById("aLabel").style.opacity = 0.6;
};

// 환경
document.getElementById("ambient").onchange = e => {
  recordings.ambient = e.target.files[0];

  document.getElementById("aDone").style.opacity = 1;

  document.getElementById("step3").style.opacity = 1;
  document.getElementById("pLabel").style.opacity = 0.6;
};

// 개인
document.getElementById("personal").onchange = e => {
  recordings.personal = e.target.files[0];

  document.getElementById("pDone").style.opacity = 1;

  document.getElementById("playText").style.opacity = 1;
};

// 🔊 레이어 재생
function play() {

  if (!recordings.breath || !recordings.ambient || !recordings.personal) {
    alert("아직 모든 흔적이 모이지 않았습니다");
    return;
  }

  const files = ["breath","ambient","personal"];

  files.forEach((k, i) => {

    const url = URL.createObjectURL(recordings[k]);
    const audio = new Audio(url);

    audio.volume = 0;

    setTimeout(() => {
      audio.play();

      let vol = 0;
      const fade = setInterval(() => {
        vol += 0.02;
        audio.volume = vol;
        if (vol >= 0.4) clearInterval(fade);
      }, 200);

    }, i * 1500);
  });
}

// 💾 다운로드 (핵심)
async function downloadMix() {

  if (!recordings.breath || !recordings.ambient || !recordings.personal) {
    alert("먼저 세 개의 소리를 기록하세요");
    return;
  }

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  async function fileToBuffer(file) {
    const arrayBuffer = await file.arrayBuffer();
    return await audioCtx.decodeAudioData(arrayBuffer);
  }

  const buffers = await Promise.all([
    fileToBuffer(recordings.breath),
    fileToBuffer(recordings.ambient),
    fileToBuffer(recordings.personal)
  ]);

  const maxLength = Math.max(...buffers.map(b => b.length));

  const output = audioCtx.createBuffer(
    1,
    maxLength,
    audioCtx.sampleRate
  );

  const outputData = output.getChannelData(0);

  buffers.forEach((buffer, i) => {
    const data = buffer.getChannelData(0);

    for (let j = 0; j < data.length; j++) {

      let volume = 0.3;
      if (i === 0) volume = 0.5;
      if (i === 1) volume = 0.3;
      if (i === 2) volume = 0.2;

      outputData[j] += data[j] * volume;
    }
  });

  function bufferToWav(buffer) {
    const length = buffer.length * 2 + 44;
    const bufferArray = new ArrayBuffer(length);
    const view = new DataView(bufferArray);

    let offset = 0;

    function writeString(s) {
      for (let i = 0; i < s.length; i++) {
        view.setUint8(offset++, s.charCodeAt(i));
      }
    }

    writeString("RIFF");
    view.setUint32(offset, 36 + buffer.length * 2, true); offset += 4;
    writeString("WAVE");
    writeString("fmt ");
    view.setUint32(offset, 16, true); offset += 4;
    view.setUint16(offset, 1, true); offset += 2;
    view.setUint16(offset, 1, true); offset += 2;
    view.setUint32(offset, buffer.sampleRate, true); offset += 4;
    view.setUint32(offset, buffer.sampleRate * 2, true); offset += 4;
    view.setUint16(offset, 2, true); offset += 2;
    view.setUint16(offset, 16, true); offset += 2;
    writeString("data");
    view.setUint32(offset, buffer.length * 2, true); offset += 4;

    const channelData = buffer.getChannelData(0);

    for (let i = 0; i < channelData.length; i++, offset += 2) {
      const s = Math.max(-1, Math.min(1, channelData[i]));
      view.setInt16(offset, s * 0x7FFF, true);
    }

    return new Blob([view], { type: "audio/wav" });
  }

  const wavBlob = bufferToWav(output);

  const link = document.createElement("a");
  link.href = URL.createObjectURL(wavBlob);

  const name = document.getElementById("name").value || "trace";

  link.download = name + ".wav";
  link.click();
}

</script>

</body>
</html>
