<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trace</title>
</head>

<body style="font-family:sans-serif; padding:30px;">

<h2>trace</h2>

<p>1. 숨소리</p>
<input type="file" accept="audio/*" capture id="breath">

<p>2. 환경 소리</p>
<input type="file" accept="audio/*" capture id="ambient">

<p>3. 좋아하는 소리</p>
<input type="file" accept="audio/*" capture id="personal">

<br><br>

<button onclick="play()">listen</button>

<script>

let recordings = {};

document.getElementById("breath").onchange = e => {
  recordings.breath = e.target.files[0];
};

document.getElementById("ambient").onchange = e => {
  recordings.ambient = e.target.files[0];
};

document.getElementById("personal").onchange = e => {
  recordings.personal = e.target.files[0];
};

function play() {

  if (!recordings.breath || !recordings.ambient || !recordings.personal) {
    alert("3개의 소리를 모두 녹음하세요");
    return;
  }

  const files = ["breath", "ambient", "personal"];

  for (let k of files) {
    const url = URL.createObjectURL(recordings[k]);
    const audio = new Audio(url);

    if (k === "breath") audio.volume = 0.4;
    if (k === "ambient") audio.volume = 0.25;
    if (k === "personal") audio.volume = 0.2;

    audio.play();
  }
}

</script>

</body>
</html>
