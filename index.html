<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trace</title>
</head>

<body style="font-family:sans-serif; padding:30px;">

<h2 id="title"></h2>
<p id="guide"></p>
<p id="status" style="color:gray;"></p>

<button id="recordBtn">● record</button>

<br><br>

<input id="label" placeholder="소리 이름 (선택)" />

<br><br>

<button id="saveBtn">남기기</button>
<button onclick="play()">listen</button>

<script>
// 모바일 제한
if (!/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
  document.body.innerHTML = "모바일에서만 사용 가능합니다.";
}

// DB
let db;
let ready = false;

const req = indexedDB.open("traceDB", 1);

req.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("audio");
};

req.onsuccess = e => {
  db = e.target.result;
  ready = true;
  status.innerText = "준비 완료";
};

// 타입
const type = new URLSearchParams(location.search).get("type");

// UI 텍스트
const title = document.getElementById("title");
const guide = document.getElementById("guide");
const status = document.getElementById("status");

if (type === "breath") {
  title.innerText = "숨소리";
  guide.innerText = "숨을 내쉬며 녹음하세요";
}
else if (type === "ambient") {
  title.innerText = "환경 소리";
  guide.innerText = "주변 소리를 녹음하세요";
}
else if (type === "personal") {
  title.innerText = "좋아하는 소리";
  guide.innerText = "마음에 드는 소리를 녹음하세요";
}
else {
  title.innerText = "레이어";
  guide.innerText = "세 개의 소리를 재생합니다";
}

let mediaRecorder;
let chunks = [];
let recordedBlob = null;
let recording = false;

// 녹음
document.getElementById("recordBtn").onclick = async () => {

  if (!recording) {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    mediaRecorder = new MediaRecorder(stream);
    chunks = [];

    mediaRecorder.ondataavailable = e => chunks.push(e.data);

    mediaRecorder.onstop = () => {
      recordedBlob = new Blob(chunks);
      status.innerText = "녹음 완료 → 이름 입력 후 저장";
    };

    mediaRecorder.start();
    recording = true;

    status.innerText = "녹음 중...";
    document.getElementById("recordBtn").innerText = "■ stop";

    setTimeout(() => {
      if (mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        recording = false;
        document.getElementById("recordBtn").innerText = "● record";
      }
    }, 8000);

  } else {
    mediaRecorder.stop();
    recording = false;
    document.getElementById("recordBtn").innerText = "● record";
  }
};

// 저장
document.getElementById("saveBtn").onclick = () => {

  if (!ready) {
    alert("준비중");
    return;
  }

  if (!recordedBlob) {
    alert("녹음 먼저");
    return;
  }

  const name = document.getElementById("label").value;

  const data = {
    blob: recordedBlob,
    name: name
  };

  const tx = db.transaction("audio", "readwrite");
  const store = tx.objectStore("audio");

  store.put(data, type);

  tx.oncomplete = () => {
    status.innerText = type + " 저장 완료";
  };
};

// 재생
async function play() {

  const types = ["breath", "ambient", "personal"];
  let count = 0;

  for (let t of types) {

    const tx = db.transaction("audio", "readonly");
    const store = tx.objectStore("audio");

    const req = store.get(t);

    await new Promise(resolve => {
      req.onsuccess = () => {

        if (!req.result) {
          console.log(t + " 없음");
          return resolve();
        }

        console.log("재생:", t);

        const url = URL.createObjectURL(req.result.blob);
        const audio = new Audio(url);

        audio.play();

        count++;
        resolve();
      };
    });
  }

  status.innerText = "현재 저장된 소리: " + count + "/3";

  if (count < 3) {
    alert("세 개의 소리를 기록해주세요");
  }
}
</script>

</body>
</html>
