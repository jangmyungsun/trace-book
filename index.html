<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trace</title>
</head>

<body style="font-family:sans-serif; padding:30px;">

<h2>trace</h2>
<p id="status">버튼을 눌러 녹음을 시작하세요</p>

<button onclick="startRecording()">record</button>
<button onclick="play()">listen</button>

<script>

let mediaRecorder;
let chunks = [];
let audioBlob = null;

// 녹음
async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    mediaRecorder = new MediaRecorder(stream);
    chunks = [];

    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      audioBlob = new Blob(chunks);
      document.getElementById("status").innerText = "녹음 완료";
    };

    mediaRecorder.start();

    document.getElementById("status").innerText = "녹음 중... (5초)";

    setTimeout(() => {
      if (mediaRecorder.state === "recording") {
        mediaRecorder.stop();
      }
    }, 5000);

  } catch (err) {
    alert("마이크 권한을 허용해주세요");
    console.log(err);
  }
}

  let audioElement = null;

function play() {

  if (!audioBlob) {
    alert("먼저 녹음하세요");
    return;
  }

  // 🔥 이미 만든 audio 재사용
  if (!audioElement) {
    const url = URL.createObjectURL(audioBlob);
    audioElement = new Audio(url);
  }

  audioElement.currentTime = 0;

  audioElement.play()
    .then(() => {
      console.log("재생 성공");
    })
    .catch(err => {
      console.log("재생 실패:", err);
      alert("소리 재생이 차단되었습니다. 다시 눌러보세요.");
    });
