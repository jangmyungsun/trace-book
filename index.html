<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trace</title>
</head>

<body style="
font-family:sans-serif;
padding:40px;
line-height:2;
background:#fff;
color:#111;
">

<p id="step1">숨을 느껴보세요</p>
<label id="bLabel" style="opacity:0.4;">
  ● 기록하기
  <input type="file" accept="audio/*" capture id="breath" style="display:none;">
</label>
<p id="bDone" style="opacity:0;">기록되었습니다</p>

<br><br>

<p id="step2" style="opacity:0.2;">주변의 소리를 들어보세요</p>
<label id="aLabel" style="opacity:0.1;">
  ● 기록하기
  <input type="file" accept="audio/*" capture id="ambient" style="display:none;">
</label>
<p id="aDone" style="opacity:0;">기록되었습니다</p>

<br><br>

<p id="step3" style="opacity:0.2;">하나를 남겨보세요</p>
<label id="pLabel" style="opacity:0.1;">
  ● 기록하기
  <input type="file" accept="audio/*" capture id="personal" style="display:none;">
</label>
<p id="pDone" style="opacity:0;">기록되었습니다</p>

<br><br>

<input placeholder="이름 (선택)" id="name">

<br><br>

<canvas id="wave" width="300" height="80"></canvas>

<br><br>

<p onclick="play()" style="cursor:pointer;">쌓인 것을 들어보세요</p>
<p onclick="downloadMix()" style="cursor:pointer;">기록을 가져가세요</p>

<script>

let recordings = {};

// 입력 처리
["breath","ambient","personal"].forEach(type=>{
  document.getElementById(type).onchange = e=>{
    recordings[type] = e.target.files[0];

    document.getElementById(type[0]+"Done").style.opacity = 1;

    if(type==="breath"){
      step2.style.opacity = 1;
      aLabel.style.opacity = 0.6;
    }

    if(type==="ambient"){
      step3.style.opacity = 1;
      pLabel.style.opacity = 0.6;
    }

    drawWave(recordings[type]);
  };
});

// 🔊 재생 (볼륨 강화 + 순차 레이어)
function play(){

  if (!recordings.breath || !recordings.ambient || !recordings.personal) {
    alert("아직 모든 흔적이 모이지 않았습니다");
    return;
  }

  ["breath","ambient","personal"].forEach((k,i)=>{
    const audio = new Audio(URL.createObjectURL(recordings[k]));

    audio.volume = 1;

    setTimeout(()=>{
      audio.play();
    }, i * 800);
  });
}

// 💾 다운로드 (iPhone 완벽 대응)
async function downloadMix(){

  if (!recordings.breath || !recordings.ambient || !recordings.personal) {
    alert("먼저 세 개의 소리를 기록하세요");
    return;
  }

  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  const buffers = await Promise.all(
    ["breath","ambient","personal"].map(async k=>{
      const arr = await recordings[k].arrayBuffer();
      return await ctx.decodeAudioData(arr);
    })
  );

  const maxLength = Math.max(...buffers.map(b=>b.length));

  const output = ctx.createBuffer(1, maxLength, ctx.sampleRate);
  const out = output.getChannelData(0);

  buffers.forEach((b,i)=>{
    const data = b.getChannelData(0);

    for(let j=0;j<data.length;j++){
      let gain = 1.5;
      if(i===1) gain = 1.2;
      if(i===2) gain = 1.0;

      out[j] += data[j] * gain;
    }
  });

  const wavBlob = new Blob([encodeWAV(output)], {type:"audio/wav"});
  const url = URL.createObjectURL(wavBlob);

  // 🔥 핵심: 페이지에 플레이어 생성
  let player = document.getElementById("finalPlayer");

  if (!player) {
    player = document.createElement("audio");
    player.id = "finalPlayer";
    player.controls = true;
    player.style.width = "100%";
    document.body.appendChild(player);
  }

  player.src = url;
  player.play();

  alert("아래 플레이어를 길게 눌러 저장하세요");
}

// WAV 변환
function encodeWAV(buffer){
  const length = buffer.length*2 + 44;
  const view = new DataView(new ArrayBuffer(length));

  function writeStr(o,s){
    for(let i=0;i<s.length;i++) view.setUint8(o+i,s.charCodeAt(i));
  }

  writeStr(0,"RIFF");
  view.setUint32(4,36+buffer.length*2,true);
  writeStr(8,"WAVE");
  writeStr(12,"fmt ");
  view.setUint32(16,16,true);
  view.setUint16(20,1,true);
  view.setUint16(22,1,true);
  view.setUint32(24,buffer.sampleRate,true);
  view.setUint32(28,buffer.sampleRate*2,true);
  view.setUint16(32,2,true);
  view.setUint16(34,16,true);
  writeStr(36,"data");
  view.setUint32(40,buffer.length*2,true);

  const data = buffer.getChannelData(0);

  let offset = 44;
  for(let i=0;i<data.length;i++){
    view.setInt16(offset, data[i]*0x7fff, true);
    offset += 2;
  }

  return view;
}

// 📊 waveform
async function drawWave(file){

  const canvas = document.getElementById("wave");
  const ctx = canvas.getContext("2d");

  const audioCtx = new AudioContext();
  const arr = await file.arrayBuffer();
  const buffer = await audioCtx.decodeAudioData(arr);

  const data = buffer.getChannelData(0);

  ctx.clearRect(0,0,300,80);

  for(let i=0;i<300;i++){
    const index = Math.floor(i/data.length*data.length);
    const val = data[index]*40;
    ctx.fillRect(i,40,val,1);
  }
}

</script>

</body>
</html>
