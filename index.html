<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trace</title>
</head>

<body style="font-family:sans-serif; padding:40px; line-height:1.8;">

<p>숨을 느껴보세요</p>
<label style="opacity:0.6;">
  ● 기록하기
  <input type="file" accept="audio/*" capture id="breath" style="display:none;">
</label>

<br><br><br>

<p>주변의 소리를 들어보세요</p>
<label style="opacity:0.6;">
  ● 기록하기
  <input type="file" accept="audio/*" capture id="ambient" style="display:none;">
</label>

<br><br><br>

<p>하나를 남겨보세요</p>
<label style="opacity:0.6;">
  ● 기록하기
  <input type="file" accept="audio/*" capture id="personal" style="display:none;">
</label>

<br><br><br><br>

<p onclick="play()" style="cursor:pointer;">
쌓인 것을 들어보세요
</p>

<script>

let recordings = {};

document.getElementById("breath").onchange = e => {
  recordings.breath = e.target.files[0];
};

document.getElementById("ambient").onchange = e => {
  recordings.ambient = e.target.files[0];
};

document.getElementById("personal").onchange = e => {
  recordings.personal = e.target.files[0];
};

function play() {

  if (!recordings.breath || !recordings.ambient || !recordings.personal) {
    alert("세 개의 흔적이 필요합니다");
    return;
  }

  const files = ["breath", "ambient", "personal"];

  for (let k of files) {
    const url = URL.createObjectURL(recordings[k]);
    const audio = new Audio(url);

    if (k === "breath") audio.volume = 0.4;
    if (k === "ambient") audio.volume = 0.25;
    if (k === "personal") audio.volume = 0.2;

    audio.play();
  }
}

</script>

</body>
</html>
