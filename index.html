<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trace</title>
</head>

<body style="font-family:sans-serif; padding:30px;">

<h2>trace</h2>
<p id="status">1. 숨소리를 녹음하세요</p>

<button onclick="record('breath')">숨 record</button>
<button onclick="record('ambient')">환경 record</button>
<button onclick="record('personal')">소리 record</button>

<br><br>

<button onclick="play()">listen</button>

<script>

let mediaRecorder;
let chunks = [];
let recordings = {};

async function record(type) {

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  mediaRecorder = new MediaRecorder(stream);
  chunks = [];

  mediaRecorder.ondataavailable = e => chunks.push(e.data);

  mediaRecorder.onstop = () => {
    recordings[type] = new Blob(chunks);
    document.getElementById("status").innerText = type + " 녹음 완료";
  };

  mediaRecorder.start();

  document.getElementById("status").innerText = type + " 녹음 중...";

  setTimeout(() => {
    if (mediaRecorder.state === "recording") {
      mediaRecorder.stop();
    }
  }, 8000);
}

function play() {

  let keys = Object.keys(recordings);

  if (keys.length < 3) {
    alert("3개의 소리를 녹음하세요");
    return;
  }

  for (let k of keys) {

    const url = URL.createObjectURL(recordings[k]);
    const audio = new Audio(url);

    if (k === "breath") audio.volume = 0.4;
    if (k === "ambient") audio.volume = 0.25;
    if (k === "personal") audio.volume = 0.2;

    // 🔥 바로 재생 (중요)
    audio.play().catch(e => console.log(e));
  }
}
