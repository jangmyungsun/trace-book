<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trace</title>
</head>

<body style="
font-family:sans-serif;
padding:40px;
line-height:2;
background:#fff;
color:#111;
">

<p id="step1">숨을 느껴보세요</p>
<label id="bLabel" style="opacity:0.4;">
  ● 기록하기
  <input type="file" accept="audio/*" capture id="breath" style="display:none;">
</label>
<p id="bDone" style="opacity:0; font-size:12px;">기록되었습니다</p>

<br><br>

<p id="step2" style="opacity:0.2;">주변의 소리를 들어보세요</p>
<label id="aLabel" style="opacity:0.1;">
  ● 기록하기
  <input type="file" accept="audio/*" capture id="ambient" style="display:none;">
</label>
<p id="aDone" style="opacity:0; font-size:12px;">기록되었습니다</p>

<br><br>

<p id="step3" style="opacity:0.2;">하나를 남겨보세요</p>
<label id="pLabel" style="opacity:0.1;">
  ● 기록하기
  <input type="file" accept="audio/*" capture id="personal" style="display:none;">
</label>
<p id="pDone" style="opacity:0; font-size:12px;">기록되었습니다</p>

<br><br><br>

<p id="playText" onclick="play()" style="opacity:0.2;">
쌓인 것을 들어보세요
</p>

<script>

let recordings = {};

// 1️⃣ 숨
document.getElementById("breath").onchange = e => {
  recordings.breath = e.target.files[0];

  document.getElementById("bDone").style.opacity = 1;

  document.getElementById("step2").style.opacity = 1;
  document.getElementById("aLabel").style.opacity = 0.6;
};

// 2️⃣ 환경
document.getElementById("ambient").onchange = e => {
  recordings.ambient = e.target.files[0];

  document.getElementById("aDone").style.opacity = 1;

  document.getElementById("step3").style.opacity = 1;
  document.getElementById("pLabel").style.opacity = 0.6;
};

// 3️⃣ 개인
document.getElementById("personal").onchange = e => {
  recordings.personal = e.target.files[0];

  document.getElementById("pDone").style.opacity = 1;

  document.getElementById("playText").style.opacity = 1;
};

function play() {

  const files = ["breath","ambient","personal"];

  files.forEach((k, i) => {

    const url = URL.createObjectURL(recordings[k]);
    const audio = new Audio(url);

    audio.volume = 0;

    setTimeout(() => {
      audio.play();

      // 페이드 인
      let vol = 0;
      const fade = setInterval(() => {
        vol += 0.02;
        audio.volume = vol;
        if (vol >= 0.4) clearInterval(fade);
      }, 200);

    }, i * 1500); // 순차 시작
  });
}

</script>

</body>
</html>

<input placeholder="이름 (선택)" id="name">
